services:
  fpga-dev:
    container_name: fpga-dev
    build:
      context: .
      dockerfile: Dockerfile
    image: fpga-dev:latest
    environment:
      - QUARTUS_ROOTDIR=${QUARTUS_ROOTDIR} 
    user: "${HOST_UID}:${HOST_GID}"
    working_dir: /home/ubuntu
    stdin_open: true
    tty: true

    volumes:
      # Neovim configuration/state
      - ${HOME}/.config/nvim:/home/ubuntu/.config/nvim
      - ${HOME}/.local/share/nvim:/home/ubuntu/.local/share/nvim
      - ${HOME}/.local/state/nvim:/home/ubuntu/.local/state/nvim

      # UVM
      - /opt/uvm/1800.2-2020.3.1/src:/opt/uvm/1800.2-2020.3.1/src:ro
      - ${HOME}/projects/FPGA_Projects/UVMA_1_2_6:/home/ubuntu/UVM_1_2_6

      # Projects
      - ${HOME}/OpenLab:/home/ubuntu/OpenLab

      # Remote CAD filesystem mounted by host
      - /proj/cad:/proj/cad:ro

      # Quartus Prime Pro installation directory 
      - ${ALTERA_ROOT}:${ALTERA_ROOT}


  quartus:
    container_name: quartus
    image: alterafpga/quartus-pro:26.1-agilex7
    pull_policy: weekly
    environment: 
      - LM_LICENSE_FILE=${LM_LICENSE_FILE}
    network_mode: "host"
    user: "${HOST_UID}:${HOST_GID}"
    working_dir: /data
    volumes:
      - ${HOME}/OpenLab/fpga/:/data # By default Quartus images use /data as target
      - ${HOME}/.license/:/${HOME}/.license/ # This project assumes quartus license is stored at .license. Change this according to your needs

